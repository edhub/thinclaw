<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="description" content="ThinClaw — lightweight AI chat in your browser" />
    <meta name="theme-color" content="#FF9940" />
    <script>
      // Inline bootstrap — runs synchronously before any bundle loads.
      // Reads the saved theme from localStorage and immediately:
      //   1. Sets data-theme on <html> (prevents theme flash / FOUC)
      //   2. Updates <meta name="theme-color"> to the correct accent color
      ;(function () {
        var ACCENTS = {
          'ayu-light': '#ff9940',
          'adwaita-light': '#3584e4',
          'base16-default': '#7cafc2',
          'catppuccin-latte': '#1e66f5',
          ingrid: '#c07028',
          'zed-onelight': '#4078f2',
        }
        try {
          var s = localStorage.getItem('thinclaw:settings')
          var theme = (s && JSON.parse(s).theme) || 'ayu-light'
          document.documentElement.dataset.theme = theme
          var accent = ACCENTS[theme] || ACCENTS['ayu-light']
          document.querySelector('meta[name="theme-color"]').setAttribute('content', accent)
        } catch (_) {}
      })()
    </script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ThinClaw" />
    <link rel="icon" href="%sveltekit.assets%/icon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="%sveltekit.assets%/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icon-192.png" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
